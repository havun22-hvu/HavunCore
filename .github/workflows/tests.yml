name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  tests:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Create .env.testing
        run: |
          cp .env.example .env.testing 2>/dev/null || true
          php artisan key:generate --env=testing --force
          echo "BROADCAST_CONNECTION=null" >> .env.testing

      - name: Security audit (composer)
        run: composer audit --format=plain
        continue-on-error: false

      - name: Run tests with coverage
        run: vendor/bin/phpunit --colors=always --coverage-text --coverage-clover=coverage.xml

      - name: Check minimum coverage
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(php -r "\$xml = simplexml_load_file('coverage.xml'); echo round((float)\$xml->project->metrics['coveredstatements'] / max(1, (float)\$xml->project->metrics['statements']) * 100, 1);")
            echo "Coverage: ${COVERAGE}%"
            MIN=40
            if [ "$(echo "$COVERAGE < $MIN" | bc -l)" -eq 1 ]; then
              echo "::error::Coverage ${COVERAGE}% is below minimum ${MIN}%"
              exit 1
            fi
          else
            echo "No coverage report found — skipping check"
          fi
