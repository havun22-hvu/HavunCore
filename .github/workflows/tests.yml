name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  tests:
    name: PHP Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create required directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: pcov

      - name: Create .env before composer install
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
          echo "BROADCAST_CONNECTION=null" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "CACHE_DRIVER=array" >> .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Create .env.testing
        run: |
          cp .env .env.testing
          php artisan key:generate --env=testing --force
          echo "DB_CONNECTION=sqlite" >> .env.testing
          echo "DB_DATABASE=:memory:" >> .env.testing
          echo "CACHE_STORE=array" >> .env.testing
          echo "CACHE_DRIVER=array" >> .env.testing
          echo "QUEUE_CONNECTION=sync" >> .env.testing
          echo "SESSION_DRIVER=array" >> .env.testing

      - name: Security audit (composer)
        run: composer audit --format=plain
        continue-on-error: false

      - name: Run tests
        run: php -d pcov.enabled=0 vendor/bin/phpunit --colors=always --no-coverage --exclude-group=doc-intelligence

      # Full coverage (Unit + Feature) — was Unit-only (~20%); Feature tests
      # cover the bulk of controller/service paths so the full number is the
      # one we gate on.
      - name: Generate coverage report
        run: php -d pcov.directory=app -d pcov.exclude="~vendor~" vendor/bin/phpunit --coverage-clover=coverage.xml --exclude-group=doc-intelligence
        continue-on-error: true
        timeout-minutes: 10

      - name: Enforce minimum coverage
        if: hashFiles('coverage.xml') != ''
        env:
          # Stapsgewijs op te trekken naar 80 % (zie open item in handover.md).
          # Huidige meting (22-04-2026): 75.2 % statements / 70.8 % methods.
          # Gate op 70 % geeft 5pp marge onder echte coverage — vangt echte
          # regressies (>5pp drop) zonder normale fluctuatie te raken.
          # Volgende ramp 70 → 75 na 2 stabiele maanden, dan 75 → 80 via
          # nieuwe tests (geen coverage-padding).
          MIN_COVERAGE: '70'
        run: |
          COVERAGE=$(php -r "\$xml = simplexml_load_file('coverage.xml'); echo round((float)\$xml->project->metrics['coveredstatements'] / max(1, (float)\$xml->project->metrics['statements']) * 100, 1);")
          echo "Coverage: ${COVERAGE}% (minimum: ${MIN_COVERAGE}%)"
          awk "BEGIN { exit !(${COVERAGE} >= ${MIN_COVERAGE}) }" || {
            echo "::error::Coverage ${COVERAGE}% is below minimum ${MIN_COVERAGE}%."
            exit 1
          }
