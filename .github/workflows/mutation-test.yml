name: Mutation Testing (Infection)

# VP-16: kwartaalse mutation-test baseline op kritieke services.
# Cron: 1e jan/apr/jul/okt om 03:00 UTC + handmatige trigger.

on:
  schedule:
    - cron: '0 3 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  mutation:
    name: Infection Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create required directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs
          mkdir -p storage/framework/cache/infection

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: pcov
          tools: composer:v2

      - name: Create .env
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
          echo "BROADCAST_CONNECTION=null" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "CACHE_DRIVER=array" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Infection
        run: vendor/bin/infection --threads=4 --min-msi=60 --min-covered-msi=70 --logger-github
        env:
          INFECTION_BADGE_API_KEY: ${{ secrets.INFECTION_BADGE_API_KEY }}

      - name: Upload Infection logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infection-logs
          path: storage/logs/infection*
          retention-days: 90
