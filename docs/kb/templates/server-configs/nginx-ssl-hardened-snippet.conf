# Havun enterprise SSL hardening snippet — A+ / 100 op alle SSL Labs metrics.
# Vervangt Let's Encrypt's options-ssl-nginx.conf default.
# Include in vhost: include /etc/nginx/snippets/ssl-hardened.conf;
#
# Vereist: nginx 1.19.4+ (voor ssl_reject_handshake + ssl_conf_command).
# Vereist: per-process OpenSSL Groups restrict via systemd env var
#          (zie openssl-restricted.cnf + systemd-nginx-openssl-override.conf)
#          om x25519 uit offered curves list te halen → Key Exchange 100.

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;

# TLS 1.2 ciphers — alleen 256-bit AEAD met ECDHE PFS.
ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

# TLS 1.3 ciphers — strip AES_128 default zodat Cipher Strength = 100.
ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;

# Session resumption aan (TLS 1.3 PSK + TLS 1.2 session-IDs).
# Nginx rotateert ticket-keys automatisch bij worker-reload → PFS blijft sterk.
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets on;
