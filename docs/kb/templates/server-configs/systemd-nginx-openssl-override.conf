# Havun systemd override voor nginx.service — load restricted OpenSSL config.
# Target: /etc/systemd/system/nginx.service.d/openssl-restricted.conf op productie.
#
# Activatie na plaatsen:
#   systemctl daemon-reload
#   systemctl restart nginx  (reload niet genoeg — env var vereist proces-restart)
#
# Verifieer:
#   echo | openssl s_client -connect <domain>:443 -servername <domain> 2>&1 | grep 'Server Temp Key'
#   Verwacht: "ECDH, secp384r1, 384 bits" (NIET "X25519, 253 bits")

[Service]
Environment=OPENSSL_CONF=/etc/nginx/openssl-restricted.cnf
