# Havun baseline security headers snippet.
# Target: /etc/nginx/snippets/security-headers-baseline.conf op productie.
# Include in vhost: include /etc/nginx/snippets/security-headers-baseline.conf;
#
# Scope: vhosts waar de APP zelf GEEN SecurityHeaders middleware heeft
# (Next.js, static sites, reverse-proxy zonder eigen header-laag).
# Laravel apps met eigen SecurityHeaders.php: NIET includen → dubbele
# headers geven browser-warnings.
#
# Vereist: ssl-hardened.conf al geïnclude (HTTPS is prerequisite voor HSTS).
#
# Verifieer (moet alle 6 zien):
#   curl -skI https://<domein>/ | grep -iE '^(strict|x-|referrer|permissions|content-security)'

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), fullscreen=(self)" always;

# CSP — restrictieve baseline met nginx-level directives.
# unsafe-inline staat erin voor Next.js hydration inline-scripts; vervang
# door nonce-based als de Next.js-app CSP-nonce middleware heeft.
# connect-src allowlist Umami analytics (umami.havun.nl) als gebruikt.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://umami.havun.nl; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https://umami.havun.nl; form-action 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;
