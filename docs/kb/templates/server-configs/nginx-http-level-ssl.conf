# Havun http-level SSL session directives.
# Target: toevoegen aan /etc/nginx/nginx.conf binnen het http { } block,
# naast de bestaande ssl_protocols regel.
#
# Waarom op http-level en niet in de snippet?
#   Session-cache zones op server-level met identieke naam in meerdere vhosts
#   leiden tot inconsistent gedrag: nginx kan dan Session-IDs uitdelen maar
#   bij resumption niet terugvinden → SSL Labs "IDs assigned but not accepted".
#   http-level = 1 cache voor alle vhosts → werkt betrouwbaar.
#
# Verifieer na toevoegen:
#   openssl s_client -connect <domein>:443 -servername <domein> \
#     -no_ticket -sess_out /tmp/s.pem -tls1_2 </dev/null >/dev/null
#   openssl s_client -connect <domein>:443 -servername <domein> \
#     -no_ticket -sess_in /tmp/s.pem -tls1_2 </dev/null 2>&1 | grep Reused
#   Verwacht: "Reused, TLSv1.2, ..."

ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets on;
